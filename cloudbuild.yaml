# MillerMCPProxy — Cloud Build v1 — deploys miller-mcp-db-v3
substitutions:
  _SERVICE: miller-mcp-db-v3
  _IMAGE: us-central1-docker.pkg.dev/miller-iq-platform/miller-iq/miller-mcp-db
  _REGION: us-central1
  _PROJECT: miller-iq-platform
  _ALLOYDB_INSTANCE_URI: projects/miller-iq-platform/locations/us-central1/clusters/miller-iq-prod/instances/miller-iq-prod-primary
steps:
- id: pull-cache
  name: gcr.io/cloud-builders/docker
  entrypoint: bash
  args: ["-c", "docker pull $_IMAGE:latest || echo no-cache"]
  env: [DOCKER_BUILDKIT=1]
- id: build
  name: gcr.io/cloud-builders/docker
  args: [build, --cache-from=$_IMAGE:latest, --build-arg, BUILDKIT_INLINE_CACHE=1, -t, "$_IMAGE:$COMMIT_SHA", -t, "$_IMAGE:latest", .]
  waitFor: [pull-cache]
  env: [DOCKER_BUILDKIT=1]
- id: push
  name: gcr.io/cloud-builders/docker
  args: [push, --all-tags, "$_IMAGE"]
  waitFor: [build]
- id: deploy
  name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
  entrypoint: bash
  args:
  - -c
  - |
    set -euo pipefail
    sed -e "s|IMAGE_PLACEHOLDER|$_IMAGE:$COMMIT_SHA|g" \\
        -e "s|ALLOYDB_INSTANCE_PLACEHOLDER|$_ALLOYDB_INSTANCE_URI|g" \\
        service.yaml > /tmp/svc.yaml
    gcloud run services replace /tmp/svc.yaml --region=$_REGION --project=$_PROJECT
  waitFor: [push]
images: ["$_IMAGE:$COMMIT_SHA", "$_IMAGE:latest"]
options:
  dynamicSubstitutions: true
  automapSubstitutions: true
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
timeout: 1200s
